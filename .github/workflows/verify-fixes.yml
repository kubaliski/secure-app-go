name: Verify Fixes

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  semgrep-vulnerable:
    name: Semgrep - Vulnerable
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Scan vulnerable version
        run: |
          docker run --rm -v $(pwd):/src \
            returntocorp/semgrep:latest \
            semgrep scan --config=auto --output=/src/vuln-report.json /src/vulnerable
      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: vuln-report
          path: vuln-report.json
        if: always()

  semgrep-fixed:
    name: Semgrep - Fixed
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan fixed version
        run: |
          docker run --rm -v $(pwd):/src \
            returntocorp/semgrep:latest \
            semgrep scan --config=auto --output=/src/fixed-report.json /src/fixed
      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: fixed-report
          path: fixed-report.json
        if: always()

  compare:
    name: Compare Results
    runs-on: ubuntu-latest
    needs: [semgrep-vulnerable, semgrep-fixed]
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: vuln-report
          path: reports
      - uses: actions/download-artifact@v4
        with:
          name: fixed-report
          path: reports
      - name: Show comparison
        shell: python3
        run: |
          import json, os
          with open('reports/vuln-report.json') as f:
              vuln = json.load(f)
          with open('reports/fixed-report.json') as f:
              fixed = json.load(f)
          nvuln = len(vuln.get('results', []))
          nfixed = len(fixed.get('results', []))
          summary = f"""## SecureApp - Verificacion de Correcciones

          ### Version Vulnerable
          **Hallazgos: {nvuln}**
          """
          for r in vuln.get('results', []):
              p = r.get('path','')
              l = r.get('start',{}).get('line','')
              m = r.get('extra',{}).get('message','')[:80]
              summary += f'- {p}:{l} - {m}\n'
          summary += f"""
          ### Version Corregida
          **Hallazgos: {nfixed}**
          """
          if nfixed == 0:
              summary += '✅ Todas las vulnerabilidades han sido corregidas'
          else:
              summary += '⚠️ Quedan hallazgos pendientes'
          with open(os.environ['GITHUB_STEP_SUMMARY'], 'a') as out:
              out.write(summary)
