name: Verify Fixes

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sast-vulnerable:
    name: SAST - Vulnerable
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Scan vulnerable version
        run: |
          docker run --rm -v $(pwd):/src \
            returntocorp/semgrep:latest \
            semgrep scan --config=auto --json /src/vulnerable > vuln-report.json || true
      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: vuln-report
          path: vuln-report.json
        if: always()

  sast-fixed:
    name: SAST - Fixed
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan fixed version
        run: |
          docker run --rm -v $(pwd):/src \
            returntocorp/semgrep:latest \
            semgrep scan --config=auto --json /src/fixed > fixed-report.json || true
      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: fixed-report
          path: fixed-report.json
        if: always()

  secrets:
    name: Secrets - Gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  compare:
    name: Compare Results
    runs-on: ubuntu-latest
    needs: [sast-vulnerable, sast-fixed]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: vuln-report
          path: reports
      - uses: actions/download-artifact@v4
        with:
          name: fixed-report
          path: reports
      - name: Show comparison
        run: python3 .github/scripts/compare_reports.py
