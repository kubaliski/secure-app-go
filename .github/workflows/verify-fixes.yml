name: Verify Fixes

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sast-vulnerable:
    name: SAST - Vulnerable
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Scan vulnerable version
        run: |
          docker run --rm -v $(pwd):/src \
            returntocorp/semgrep:latest \
            semgrep scan --config=auto --output=/src/vuln-report.json /src/vulnerable
      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: vuln-report
          path: vuln-report.json
        if: always()

  sast-fixed:
    name: SAST - Fixed
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan fixed version
        run: |
          docker run --rm -v $(pwd):/src \
            returntocorp/semgrep:latest \
            semgrep scan --config=auto --output=/src/fixed-report.json /src/fixed
      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: fixed-report
          path: fixed-report.json
        if: always()

  secrets:
    name: Secrets - Gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  compare:
    name: Compare Results
    runs-on: ubuntu-latest
    needs: [sast-vulnerable, sast-fixed]
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: vuln-report
          path: reports
      - uses: actions/download-artifact@v4
        with:
          name: fixed-report
          path: reports
      - name: Show comparison
        run: |
          python3 << 'EOF'
          import json, os
          with open('reports/vuln-report.json') as f:
              vuln = json.load(f)
          with open('reports/fixed-report.json') as f:
              fixed = json.load(f)
          nvuln = len(vuln.get('results', []))
          nfixed = len(fixed.get('results', []))
          summary = "## SecureApp - Verificacion de Correcciones\n\n"
          summary += "### Version Vulnerable\n**Hallazgos: " + str(nvuln) + "**\n"
          for r in vuln.get('results', []):
              p = r.get('path','')
              l = r.get('start',{}).get('line','')
              m = r.get('extra',{}).get('message','')[:80]
              summary += "- " + p + ":" + str(l) + " - " + m + "\n"
          summary += "\n### Version Corregida\n**Hallazgos: " + str(nfixed) + "**\n"
          if nfixed == 0:
              summary += "OK - Todas las vulnerabilidades han sido corregidas\n"
          else:
              summary += "ATENCION - Quedan hallazgos pendientes\n"
          with open(os.environ['GITHUB_STEP_SUMMARY'], 'a') as out:
              out.write(summary)
          EOF
