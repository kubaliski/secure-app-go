name: Verify Fixes

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sast-vulnerable:
    name: SAST - Vulnerable
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Scan
        run: |
          docker run --rm -v $(pwd):/src \
            returntocorp/semgrep:latest \
            semgrep scan --config=auto --json /src/vulnerable > vuln-report.json || true
      - uses: actions/upload-artifact@v4
        with:
          name: vuln-report
          path: vuln-report.json
        if: always()

  sast-fixed:
    name: SAST - Fixed
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan
        run: |
          docker run --rm -v $(pwd):/src \
            returntocorp/semgrep:latest \
            semgrep scan --config=auto --json /src/fixed > fixed-report.json || true
      - uses: actions/upload-artifact@v4
        with:
          name: fixed-report
          path: fixed-report.json
        if: always()

  secrets:
    name: Secrets - Gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  dast-vulnerable:
    name: DAST - Vulnerable (ZAP)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - name: Build and run vulnerable app
        run: |
          cd vulnerable && go build -v -o /tmp/vuln-app . 2>&1
          echo "Binary size: $(ls -lh /tmp/vuln-app | awk '{print $5}')"
          /tmp/vuln-app &
          sleep 5
          curl -s -o /dev/null -w "%{http_code}" http://localhost:8081/login || echo "App not responding yet"
      - name: ZAP baseline scan
        run: |
          docker run --rm --network host \
            -v $(pwd):/zap/wrk \
            -u root \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py -t http://localhost:8081/login \
            -r /zap/wrk/zap-vuln-report.html
      - uses: actions/upload-artifact@v4
        with:
          name: zap-vuln-report
          path: zap-vuln-report.html
        if: always()

  dast-fixed:
    name: DAST - Fixed (ZAP)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - name: Build and run fixed app
        run: |
          cd fixed && go build -v -o /tmp/fixed-app . 2>&1
          echo "Binary size: $(ls -lh /tmp/fixed-app | awk '{print $5}')"
          /tmp/fixed-app &
          sleep 5
          curl -s -o /dev/null -w "%{http_code}" http://localhost:8082/login || echo "App not responding yet"
      - name: ZAP baseline scan
        run: |
          docker run --rm --network host \
            -v $(pwd):/zap/wrk \
            -u root \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py -t http://localhost:8082/login \
            -r /zap/wrk/zap-fixed-report.html
      - uses: actions/upload-artifact@v4
        with:
          name: zap-fixed-report
          path: zap-fixed-report.html
        if: always()

  compare:
    name: Compare Results
    runs-on: ubuntu-latest
    needs: [sast-vulnerable, sast-fixed, dast-vulnerable, dast-fixed]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: vuln-report
          path: reports
      - uses: actions/download-artifact@v4
        with:
          name: fixed-report
          path: reports
      - name: Show comparison
        run: python3 .github/scripts/compare_reports.py
